<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Management System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="auth-page">
    <div class="auth-box">
      <h1>Task Management System</h1>
      <div class="tabs">
        <button class="tab-btn active" id="btn-login" onclick="showTab('login', this)">Login</button>
        <button class="tab-btn" id="btn-register" onclick="showTab('register', this)">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login-tab">
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="login-error" class="error"></p>
      </div>

      <!-- Register Form -->
      <div id="register-tab" style="display:none">
        <input type="text" id="reg-username" placeholder="Username">
        <input type="password" id="reg-password" placeholder="Password">
        <select id="reg-role">
          <option value="developer">Developer</option>
          <option value="tester">Tester</option>
          <option value="manager">Manager</option>
          <option value="admin">Admin</option>
        </select>
        <button onclick="register()">Create Account</button>
        <p id="reg-error" class="error"></p>
      </div>
    </div>
  </div>

  <!-- MAIN APP PAGE -->
  <div id="app-page" style="display:none">

    <nav>
      <h2>Task Management System</h2>
      <div>
        <span id="nav-username"></span>
        <button onclick="logout()">Logout</button>
      </div>
    </nav>

    <!-- Dashboard with stats and pie chart -->
    <div class="dashboard">
      <div class="stats">
        <div class="stat-box">
          <h3 id="count-todo">0</h3>
          <p>To Do</p>
        </div>
        <div class="stat-box">
          <h3 id="count-inprogress">0</h3>
          <p>In Progress</p>
        </div>
        <div class="stat-box">
          <h3 id="count-completed">0</h3>
          <p>Completed</p>
        </div>
        <div class="stat-box chart-box">
          <canvas id="taskChart"></canvas>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="add-btn" onclick="openModal()">+ Add Task</button>
      <select onchange="changeSortStrategy(this.value)">
        <option value="priority">Sort by Priority</option>
        <option value="duedate">Sort by Due Date</option>
        <option value="status">Sort by Status</option>
      </select>
    </div>

    <div class="kanban">
      <div class="column">
        <h3 class="col-title todo-title">To Do</h3>
        <div id="col-todo" class="col-body"></div>
      </div>
      <div class="column">
        <h3 class="col-title inprogress-title">In Progress</h3>
        <div id="col-inprogress" class="col-body"></div>
      </div>
      <div class="column">
        <h3 class="col-title completed-title">Completed</h3>
        <div id="col-completed" class="col-body"></div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal" style="display:none">
    <div class="modal-box">
      <h3 id="modal-title">Add Task</h3>
      <input type="text" id="task-title" placeholder="Task title">
      <textarea id="task-desc" placeholder="Description"></textarea>
      <select id="task-priority">
        <option value="high">High Priority</option>
        <option value="medium" selected>Medium Priority</option>
        <option value="low">Low Priority</option>
      </select>
      <select id="task-status">
        <option value="todo">To Do</option>
        <option value="inprogress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
      <input type="date" id="task-due">
      <select id="task-assign">
        <option value="">Unassigned</option>
      </select>
      <div class="modal-buttons">
        <button onclick="saveTask()">Save Task</button>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      </div>
      <p id="task-error" class="error"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
